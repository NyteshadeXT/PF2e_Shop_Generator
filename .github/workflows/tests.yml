name: Generator tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip

      - name: Validate deployment assets
        run: python -m unittest tests.test_deployment_config -v

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run regression suite
        run: python -W error::ResourceWarning -m unittest discover -s tests -v

      - name: Smoke test production server
        env:
          LOOTGEN_STATE_DB_PATH: ${{ runner.temp }}/player-views-smoke.db
          LOOTGEN_GM_ACCESS_KEY: smoke-test-private-key
          LOOTGEN_SESSION_SECRET: smoke-test-session-secret-that-is-not-used-in-production
          LOOTGEN_LOGIN_ATTEMPTS: "2"
          LOOTGEN_LOGIN_WINDOW_SECONDS: "1"
          RENDER: "1"
        run: |
          gunicorn --bind 127.0.0.1:8765 --workers 2 --timeout 30 app:app > "$RUNNER_TEMP/gunicorn.log" 2>&1 &
          server_pid=$!
          if ! python tests/production_smoke.py http://127.0.0.1:8765; then
            cat "$RUNNER_TEMP/gunicorn.log"
            kill "$server_pid" || true
            wait "$server_pid" || true
            exit 1
          fi
          kill "$server_pid"
          wait "$server_pid" || true
